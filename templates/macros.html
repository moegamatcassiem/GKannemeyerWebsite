{% macro joinery_divider(variant) %}
<svg class="joinery-divider joinery-divider--{{ variant }}" viewBox="0 0 1200 56" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <rect class="joint-bg" x="0" y="0" width="1200" height="28"/>
  <rect class="joint-fg" x="0" y="28" width="1200" height="28"/>
  <rect class="joint-fg" x="0" y="0" width="120" height="28"/>
  <rect class="joint-fg" x="240" y="0" width="120" height="28"/>
  <rect class="joint-fg" x="480" y="0" width="120" height="28"/>
  <rect class="joint-fg" x="720" y="0" width="120" height="28"/>
  <rect class="joint-fg" x="960" y="0" width="120" height="28"/>
  <rect class="joint-bg" x="120" y="28" width="120" height="28"/>
  <rect class="joint-bg" x="360" y="28" width="120" height="28"/>
  <rect class="joint-bg" x="600" y="28" width="120" height="28"/>
  <rect class="joint-bg" x="840" y="28" width="120" height="28"/>
  <rect class="joint-bg" x="1080" y="28" width="120" height="28"/>
</svg>
{% endmacro %}

{% macro tool_icon(name) %}
  {% if name == "chisel" %}
<svg class="service-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20 L10 14"/><path d="M10 14 L14 10 L18 6"/><path d="M18 6 L21 3"/><path d="M14 10 L17 13"/></svg>
  {% elif name == "plane" %}
<svg class="service-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 16 L4 16 L7 9 L18 9 L21 13 L21 16 L2 16 Z"/><path d="M9 9 L9 5"/><line x1="2" y1="19" x2="21" y2="19"/></svg>
  {% elif name == "square" %}
<svg class="service-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4 L4 20 L20 20"/><path d="M4 14 L14 14"/><path d="M10 4 L10 9"/></svg>
  {% elif name == "hammer" %}
<svg class="service-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4 L20 10 L17 13 L11 7 Z"/><path d="M11 7 L4 14"/><path d="M2 19 L6 16"/></svg>
  {% endif %}
{% endmacro %}
